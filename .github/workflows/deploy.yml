name: CI/CD Todo API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t todo-api:ci .

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: [test, build-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/todo-api"

      - name: Build and deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/todo-api

            echo "Stopping previous container"
            docker stop todo-api || true
            docker rm todo-api || true

            echo "Building new Docker image"
            docker build -t todo-api .

            echo "Creating persistent volume"
            docker volume create todo_api_data || true

            echo "Starting container"
            docker run -d --name todo-api --restart unless-stopped -p 80:5050 \
              -e DB_PATH=/app/data/todos.db \
              -v todo_api_data:/app/data \
              todo-api

            echo "Health check"
            sleep 5
            curl -fsS http://localhost/health

            echo "Deployment completed successfully"
